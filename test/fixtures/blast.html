<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Blast radius fixture — "change THE button, not all buttons"</title>

      /* line numbers stable — the shared rule every button inherits */
      button { font-size: 14px; padding: 6px 12px; }
      #cta { background-color: rgb(108, 92, 231); }
    </style>
  </head>
  <body>
    <main id="toolbar">
      <button class="btn save">Save</button>

      <button id="cta" class="btn primary">Subscribe</button>
    </main>
  </body>
</html>
