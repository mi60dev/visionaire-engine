<!doctype html>
<!--
  assert_visual e2e fixture — LOAD-BEARING GEOMETRY (asserted exactly in test/assert.e2e.test.ts):
  - #card-a / #card-b (.card): content heights 412px vs 388px (delta 24), widths both 300, tops both 20,
    card-a right edge 320 < card-b left edge 340 (left_of).
  - #centered: 200w in a 400w parent at left 100 → gaps 100/100 (centered x PASS).
  - #off-center: 350w in a 400w parent at left 40 → gaps 40/10 (delta 30, centered x FAIL).
  - .nav-item ×4: 60w at x 0/76/152/228 → gaps 16/16/16 (gap_equals 16 PASS).
  - .bad-item ×4: 60w at x 0/76/144/220 → gaps 16/8/16 (spacing_equals FAIL, spread 8).
  - #clipped: 234w inside #clip-wrap (200w, overflow:hidden) → exceeds right by 34px.
  - #badge (z-index 5) overlaps #base by 20x20px at (580,640) and paints above it; NOTHING else may
    ever intersect #base (its not_overlapped FAIL must blame #badge alone).
  - #swatch: background #ff0000, color rgb(0,128,0).
  - #sized: content box exactly 320x50; nothing may ever overlap it (not_overlapped PASS).
  - #trunc: 120w nowrap ellipsis with long text → scrollWidth > clientWidth.
  - #hidden: display:none. #offscreen: (20,1500) 100x40, background #dddddd — outside a 1280x800
    viewport at scroll (0,0), fully inside it at scroll (0,800). Body is 1600px tall.
  - #save-btn: <button> named "Save" at (900,720) 120x40 — the ONLY role=button (role+name targeting).
  - #abs-escape: position:absolute child of the STATIC overflow:hidden #abs-clipper (100x100 at
    (950,460)); its containing block is the position:relative #abs-wrap, so it escapes the clip and
    renders free at doc (950,610) 80x30 → not_clipped PASS.
  - #caged: position:absolute child of #cage (position:relative + overflow:hidden, 100x60 at
    (700,790)); left 60 + width 70 → exceeds the cage's right edge by exactly 30px.
  - #rule: border-only divider at (1100,460) — width 100, height 0, 2px top border → 100x2 border box.
  - #scaled: content-box 100x50 (+10px padding, 2px border) at (1000,20), transform scale(2) with
    origin top left → painted content box 200x100 (border box 248x148).
  - #portal: transparent, empty, borderless position:fixed inset-0 overlay, LAST in body — paints
    nothing itself and must never be reported as an occluder.
  All boxes border-less and padding-less so content box = border box unless noted
  (#rule, #scaled, #save-btn carry borders/padding by design).
-->
<html>
<head>
<meta charset="utf-8">
<title>assert fixture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 1600px; position: relative; font-family: Arial, sans-serif; }
  #card-a { position: absolute; left: 20px;  top: 20px; width: 300px; height: 412px; background: #eeeeee; }
  #card-b { position: absolute; left: 340px; top: 20px; width: 300px; height: 388px; background: #e0e0e0; }
  #center-wrap { position: absolute; left: 20px;  top: 460px; width: 400px; height: 100px; background: #fafafa; }
  #centered    { position: absolute; left: 100px; top: 10px;  width: 200px; height: 50px; background: #ccccff; }
  #off-wrap    { position: absolute; left: 500px; top: 460px; width: 400px; height: 100px; background: #fafafa; }
  #off-center  { position: absolute; left: 40px;  top: 10px;  width: 350px; height: 50px; background: #ffcccc; }
  #nav     { position: absolute; left: 20px;  top: 580px; width: 400px; height: 30px; }
  #nav-bad { position: absolute; left: 500px; top: 580px; width: 400px; height: 30px; }
  .nav-item, .bad-item { position: absolute; top: 0; width: 60px; height: 30px; background: #ccffcc; }
  #clip-wrap { position: absolute; left: 20px; top: 640px; width: 200px; height: 60px; overflow: hidden; background: #f5f5f5; }
  #clipped   { width: 234px; height: 40px; background: #ffffcc; }
  #base  { position: absolute; left: 500px; top: 640px; width: 100px; height: 40px; background: #ccffff; }
  #badge { position: absolute; left: 580px; top: 630px; width: 40px;  height: 30px; background: #ff00cc; z-index: 5; }
  #swatch { position: absolute; left: 700px; top: 640px; width: 60px; height: 40px; background: #ff0000; color: rgb(0, 128, 0); }
  #sized { position: absolute; left: 20px;  top: 720px; width: 320px; height: 50px; background: #cccccc; }
  #trunc { position: absolute; left: 400px; top: 720px; width: 120px; height: 24px;
           white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font: 16px Arial; }
  #hidden { display: none; }
  #offscreen { position: absolute; left: 20px; top: 1500px; width: 100px; height: 40px; background: #ddd; }
  #save-btn { position: absolute; left: 900px; top: 720px; width: 120px; height: 40px; }
  #abs-zone { position: absolute; left: 950px; top: 460px; width: 120px; height: 100px; }
  #abs-wrap { position: relative; width: 100px; height: 100px; }
  #abs-clipper { overflow: hidden; width: 100px; height: 100px; background: #f0f0f0; }
  #abs-escape { position: absolute; left: 0; top: 150px; width: 80px; height: 30px; background: #ffe0cc; }
  #cage-zone { position: absolute; left: 700px; top: 790px; width: 200px; height: 100px; }
  #cage { position: relative; width: 100px; height: 60px; overflow: hidden; background: #f5f5f5; }
  #caged { position: absolute; left: 60px; top: 10px; width: 70px; height: 20px; background: #ffddaa; }
  #rule { position: absolute; left: 1100px; top: 460px; width: 100px; height: 0; border-top: 2px solid #333333; }
  #scaled { position: absolute; left: 1000px; top: 20px; width: 100px; height: 50px; padding: 10px;
            border: 2px solid #333333; background: #eeeeee; box-sizing: content-box;
            transform: scale(2); transform-origin: top left; }
  #portal { position: fixed; left: 0; top: 0; right: 0; bottom: 0; pointer-events: none; }
</style>
</head>
<body>
  <div id="card-a" class="card"></div>
  <div id="card-b" class="card"></div>
  <div id="center-wrap"><div id="centered"></div></div>
  <div id="off-wrap"><div id="off-center"></div></div>
  <div id="nav">
    <div class="nav-item" style="left: 0"></div>
    <div class="nav-item" style="left: 76px"></div>
    <div class="nav-item" style="left: 152px"></div>
    <div class="nav-item" style="left: 228px"></div>
  </div>
  <div id="nav-bad">
    <div class="bad-item" style="left: 0"></div>
    <div class="bad-item" style="left: 76px"></div>
    <div class="bad-item" style="left: 144px"></div>
    <div class="bad-item" style="left: 220px"></div>
  </div>
  <div id="clip-wrap"><div id="clipped"></div></div>
  <div id="base"></div>
  <div id="badge"></div>
  <div id="swatch">A</div>
  <div id="sized"></div>
  <div id="trunc">This is a very long line of text that cannot possibly fit</div>
  <div id="hidden">secret</div>
  <div id="offscreen"></div>
  <button id="save-btn">Save</button>
  <div id="abs-zone"><div id="abs-wrap"><div id="abs-clipper"><div id="abs-escape"></div></div></div></div>
  <div id="cage-zone"><div id="cage"><div id="caged"></div></div></div>
  <div id="rule"></div>
  <div id="scaled"></div>
  <div id="portal"></div>
</body>
</html>
